{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <title>Réglages - Smart-Uni</title>
</head>
<body>
    <main>
        <h2>Réglages de l'objet : {{ objet.nom }} ({{ objet.type_objet }})</h2>
        <form method="POST">
            {% csrf_token %}
            
            <fieldset>
                <legend>État de l'appareil</legend>
                <label>
                    <input type="checkbox" name="etat" {% if objet.etat %}checked{% endif %}>
                    Allumer l'appareil
                </label>
            </fieldset>

            <fieldset>
                <legend>Puissance allouée (Watts)</legend>
                <label for="puissance">Modifier la puissance :</label>
                <input type="number" id="puissance" name="puissance" value="{{ objet.consommation|default:50.0 }}" step="0.1">
            </fieldset>

            <button type="submit">Appliquer les réglages</button>
            <a href="{% url 'dashboard' %}">Retour au tableau de bord</a>
        </form>
    </main>
</body>
</html>
