{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <title>Modifier mon profil - Smart-Uni</title>
</head>
<body>
    <header>
        <h1>Modifier mes informations</h1>
        <a href="{% url 'dashboard' %}">Retour au tableau de bord</a>
    </header>

    <main>
        <section>
            <form method="POST">
                {% csrf_token %}
                <fieldset>
                    <legend>Informations Personnelles</legend>
                    <label for="first_name">Prénom :</label>
                    <input type="text" id="first_name" name="first_name" value="{{ user.first_name }}" required>

                    <label for="last_name">Nom :</label>
                    <input type="text" id="last_name" name="last_name" value="{{ user.last_name }}" required>

                    <label for="email">Email :</label>
                    <input type="email" id="email" name="email" value="{{ user.email }}" required>

                    <label for="phone">Téléphone :</label>
                    <input type="tel" id="phone" name="phone" value="{{ user.phone_number }}">

                    <label for="age">Âge :</label>
                    <input type="number" id="age" name="age" value="{{ user.age }}">

                    <label for="sex">Sexe :</label>
                    <select id="sex" name="sex">
                        <option value="M" {% if user.sex == 'M' %}selected{% endif %}>Homme</option>
                        <option value="F" {% if user.sex == 'F' %}selected{% endif %}>Femme</option>
                    </select>
                </fieldset>

                <button type="submit">Enregistrer les modifications</button>
            </form>
        </section>
    </main>
</body>
</html>
