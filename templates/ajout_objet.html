{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <title>Ajouter un objet - Smart-Uni</title>
</head>
<body>
    <main>
        {% if messages %}
            <ul class="messages">
                {% for message in messages %}<li>{{ message }}</li>{% endfor %}
            </ul>
        {% endif %}
        <h2>Ajouter un nouvel objet</h2>

        <form method="POST">
            {% csrf_token %}

            <label for="nom_objet">Nom :</label>
            <input type="text" id="nom_objet" name="nom_objet" required>

            <label for="type_objet">Type :</label>
            <select id="type_objet" name="type_objet" required>
                {% for value, label in type_choices %}
                    <option value="{{ value }}">{{ label }}</option>
                {% endfor %}
            </select>

            <label for="piece">Pièce :</label>
            <select id="piece" name="piece" required>
                {% for p in pieces %}
                    <option value="{{ p.id }}">{{ p.nom }} - Logement {{ p.logement.numero_logement }}</option>
                {% endfor %}
            </select>

            <label for="marque">Marque :</label>
            <input type="text" id="marque" name="marque" required>

            <label for="connectivite">Connectivité :</label>
            <select id="connectivite" name="connectivite" required>
                <option value="">-- Choisir --</option>
                <option value="Wi-Fi">Wi-Fi</option>
                <option value="Bluetooth">Bluetooth</option>
                <option value="Zigbee">Zigbee</option>
            </select>

            <label for="niveau_batterie">Niveau de batterie (%) :</label>
            <input type="number" id="niveau_batterie" name="niveau_batterie" min="0" max="100">

            <label for="derniere_interaction" required>Dernière interaction :</label>
            <input type="datetime-local" id="derniere_interaction" name="derniere_interaction">

            <label for="description">Description :</label>
            <textarea id="description" name="description" rows="4"></textarea>

            <button type="submit">Enregistrer</button>
            <a href="{% url 'dashboard' %}">Annuler</a>
        </form>
    </main>
</body>
</html>
